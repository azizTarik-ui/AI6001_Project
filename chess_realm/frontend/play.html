<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chess Realm – Play</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Chess Realm</h1>

      <!-- Status message -->
      <p id="status">Your turn (White)</p>

      <!-- Chess board canvas -->
      <canvas id="chessBoard" width="480" height="480"></canvas>

      <!-- Move list -->
      <div class="move-list">
        <h3>Moves</h3>
        <p id="moves">No moves yet.</p>
      </div>

      <!-- Buttons -->
      <div class="button-group">
        <button class="btn">Resign</button>
        <a href="history.html" class="btn">View History</a>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
